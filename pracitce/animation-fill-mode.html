<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Fill Mode - Backwards</title>

    <style>

        body{
            margin:50px;
        }

        .box{
            width:100px;
            height:100px;
            background:red;

            animation-name: moveBox;
            animation-duration:3s;
            animation-delay:3s;
            animation-fill-mode:backwards;
        }

        @keyframes moveBox{

            from{
                transform:translateX(200px);
                background:blue;
            }

            to{
                transform:translateX(500px);
                background:green;
            }

        }

    </style>

</head>
<body>

    <div class="box"></div>

</body>
</html>
