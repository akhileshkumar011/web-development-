<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating Cards</title>
    <style>
        *{
            margin:0px;
            padding:0px;
            box-sizing:border-box;
        }
        .container{
            width:100%;
            height:100vh;
           background-image: linear-gradient( 126.6deg,  rgba(44,115,210,1) 3.4%, rgba(251,234,255,1) 127.9% );
           display:flex;
           justify-content:center;
           align-items:center;
        }
        .card{
            width:250px;
            height:420px;
            background-color:white;
            border-radius:10px;
            padding:10px;
            display:flex;
            flex-direction:column;
            align-items:center;

           
            
        }
        .card img{
            height:55%;
            width:91%;
            margin:5px;
            border-radius:10px;
        }
        h2{
            font-size:1.3rem;
            margin:5px
        }
        .card p{
            font-size:1rem;
            margin:5px;
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="qr.png" alt="">
            <h2>Improve your front end skills by developing Projects</h2>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Recusandae qui ut numquam excepturi reiciendis expedita sint libero consequatur id quod?</p>
        </div>
    </div>
</body>
</html>
