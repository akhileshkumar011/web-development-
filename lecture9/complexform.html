<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name :</label>
        <input type="text" id="name" name="name1">
        <label for="email">Email :</label>
        <input type="email" id="email" name="email1">
        <label for="number">Number :</label>
        <input type="tel" id="number" name="number1">
        <label for="dob">Date of Birth :</label>
        <input type="date" id="dob" name="dob">
       <span>Gender :</span>
       <label for="male"> Male </label>
        <input type="radio" id="male" name="gender">
        <label for="female"> Female </label>
        <input type="radio" id="female " name="gender">
        <label for="countary">Countary</label>
        <select name="countary" id="countary">
            <option value="india">India</option>
            <option value="russia">Russia</option>
            <option value="china">China</option>
        </select>
        
    </fieldset>
    <fieldset>
        <legend>
            <label for="street">Street Address</label>
            <input type="text" id="street" name="street">
            <label for="city">City :</label>
            <input type="text" id="city" name="city">
            <label for="state">State :</label>
            <input type="text" id="state" name="state">
            <label for="zip">Zip Code :</label>
            <input type="text" id="zip" name="zip">
        </legend>
    </fieldset>
    <fieldset>
        <legend>Other Information</legend>
        <label for="comment">Comment :</label>
        <textarea name="comment" id="comment"></textarea>
        <label for="agreement">I agree to terms and condition </label>
        <input type="checkbox" id="agreement" name="agreement">
    </fieldset>
    <button>sumbit</button>
</body>
</html>
