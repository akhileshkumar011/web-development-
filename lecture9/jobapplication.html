<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="name">Name :</label>
        <input type="text" id="name" name="name1" >
        <br><br>
        <label for="email">Email :</label>
        <input type="email" id="email" name="email1" >
        <br><br>
        <label for="Phone">Phone :</label>
        <input type="tel" id="name" name="name1" >
        <br><br>
        <label for="resume">Resume :</label>
        <input type="file" id="resume" name="resume1">
        <br><br>
        <label for="years">Experience years</label>
        <input type="text" for="years" name="experience">
        <br><br>
        <fieldset>
            <legend>Skills</legend>
            <label for="html">HTML</label>
            <input type="checkbox" id="html" name="html">
            <br><br>
            <label for="css">CSS</label>
            <input type="checkbox" id="css" name="html">
            <br><br>
            <label for="JavaScript">JavaScript</label>
            <input type="checkbox" id="JavaScript" name="html">
        </fieldset>
        <br><br>
        <label for="select">Higest Education :</label>
        <select id="select" name="education">
            <option value="10">10</option>
            <option value="12">12</option>
            <option value="btech">btech</option>
        </select>

        <br><br>
        <fieldset>
            <legend>Availability</legend>
            <label for="full time">Full Time</label>
            <input type="radio" id="full time" name="radio">
            <br><br>
            <label for="part time">Part Time</label>
            <input type="radio" id="part time" name="radio">
        </fieldset>
        <br><br>
        <label for="comment">Additional comments :</label>
        <br>
        <textarea id="comment" name="comment" cols="30" rows="10"></textarea>
        <input type="submit" value="Submit Application" >
    </form>
</body>
</html>
