<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --width:500px;
            --background-color: rgb(230, 240, 241);
        }
        .container{
            height:700px;
            width:700px;
            margin:2px;
            padding:2px;
            border: 2px solid blue;
            background-color: rgb(241, 239, 237);
            display:flex;
            justify-content: center;
            flex-wrap: wrap;
            align-items:center;
        }
        .box{
            /* --width:500px;
            --background-color: yellow; */
            height: 500px;
            width:var(--width);
            margin:5px;
            padding:5px;
            border: 2px solid rgb(16, 15, 15);
            background-color: var(--background-color);
            /* box-shadow: 10px 20px brown; */
             /* box-shadow: 10px 20px 10px brown; */
             /* box-shadow: 10px 20px 100px 5px brown; */
            /* box-shadow: inset -10px -20px 100px 5px brown; */
            box-shadow:20px 20px 20px 5px rgb(232, 167, 167), inset 2px 2px 30px 15px rgb(138, 190, 106);     
        }
        #box1{
            /* text-shadow: 2px 2px 5px rgb(194, 190, 190); */

            /* multiple text shadows */
            text-shadow: 2px 2px 5px rgb(194, 190, 190), -2px -2px 5px rgb(180, 135, 135);


        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img id="box2" height="200px" width="200px" src="https://images.unsplash.com/photo-1485465053475-dd55ed3894b9?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGNhc3RsZXxlbnwwfHwwfHx8MA%3D%3D" alt="">

            <h2 id="box1">welcome to the Castle</h2>

        </div>
    </div>
</body>
</html>
