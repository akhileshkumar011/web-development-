<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            border: 2px solid red;
            overflow : auto;

            /* overflow--> the overflow property specifies what should happen if content overflows an element's box. The overflow property can have the following values: visible, hidden, scroll, auto, inherit. */

        }
        .item{
            border:2px solid black;
            width : 100px;
            height :100px;
            background-color: aquamarine;
            margin : 2px;
            float : left;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
    </div>
</body>
</html>
