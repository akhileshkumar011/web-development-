<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display:flex;
            flex-direction:row;
            
            height:500px;
            width:800px;
            border:2px solid red;
            margin:2px;
            padding:2px;
        }
        #leftbox{
            width:200px;
            height:200px;
            border:2px solid black;
            margin:2px;
            padding:2px;
        }
        #rightbox{
            width:200px;
            height:200px;
            border:2px solid black;
            margin:2px;
            padding:2px;
        }
        p{
            border:2px solid blue;
            margin:2px;
            padding:2px;
        }
        @media (max-width:600px){
            .container{
                flex-direction:column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="leftbox">
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Nobis, vitae.</p>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit.</p>
        </div>
        <div id="rightbox">
            <img style="height: 200px; width: 200px;" src="https://images.unsplash.com/photo-1485465053475-dd55ed3894b9?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGNhc3RsZXxlbnwwfHwwfHx8MA%3D%3D" alt="">
        </div>
    </div>
</body>
</html>
