<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: antiquewhite;
            margin: 1px; padding:2px; border: 2px solid red; height:500px; 
            width:500px;
            display:flex;
            

        }
        .box{
            border: 2px solid black;
            width: 100px;
            height: 100px;
            margin: 2px;
            padding:2px;  
        }
        #box1{
            background-color: aquamarine;
            
        }
        #box2{
            background-color: rgb(6, 133, 29);
            
        }
        #box3{
            background-color: rgb(199, 114, 11);   
        }
        #box4{
            background-color: rgb(126, 90, 35);
            
        }
        @media (max-width:600px){
            .container{
                flex-direction:column;
            }
            }
        @media (min-width:600px){
            .container{
                flex-direction:row;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">box1</div>
        <div class="box" id="box2">box2</div>
        <div class="box" id="box3">box3</div>
        <div class="box" id="box4">box4</div>
    </div>
</body>
</html>
